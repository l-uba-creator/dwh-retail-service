services:
  postgres:
    image: postgres:16
    container_name: dwh_postgres
    environment:
      POSTGRES_USER: dwh
      POSTGRES_PASSWORD: dwh
      POSTGRES_DB: dwh
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/sql
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dwh -d dwh"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - dwh_net

  metabase:
    image: metabase/metabase:v0.50.20
    container_name: dwh_metabase
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    networks:
      - dwh_net

networks:
  dwh_net:
    name: dwh_net

volumes:
  pgdata:
